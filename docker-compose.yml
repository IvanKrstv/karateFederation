version: "3.9"

services:
  web:
    build: .
    container_name: karateFederation_web
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn karateFederation.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:16
    container_name: karateFederation_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7
    container_name: karate_redis
    restart: always

  celery:
    build: .
    container_name: karate_celery
    restart: always
    command: celery -A karateFederation worker --loglevel=info
    volumes:
      - .:/app
      - media_volume:/app/media
    depends_on:
      - redis
      - db
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: karateFederation_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: